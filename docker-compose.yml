services:
  db:
    image: postgres:16-alpine
    container_name: pharmigo-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharmigo}
      POSTGRES_USER: ${POSTGRES_USER:-pharmigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmigo}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pharmigo-network

  redis:
    image: redis:7-alpine
    container_name: pharmigo-redis
    ports:
      - "6379:6379"
    networks:
      - pharmigo-network

  backend:
    build:
      context: ./backend
    container_name: pharmigo-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-True}
      PHARMIGO_DEBUG: ${PHARMIGO_DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,*}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-pharmigo}
      POSTGRES_USER: ${POSTGRES_USER:-pharmigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmigo}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: redis
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3001}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-True}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@pharmigo.com}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-FanU@2026}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/media:/app/media
    ports:
      - "8000:8000"
    networks:
      - pharmigo-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: pharmigo-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    networks:
      - pharmigo-network

networks:
  pharmigo-network:
    driver: bridge

volumes:
  postgres_data:
